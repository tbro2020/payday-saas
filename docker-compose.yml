version: '3.9'

services:
  web:
    build: .
    command: gunicorn payday.wsgi:application --bind 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      - redis
    env_file:
      - ./docker/.env

  redis:
    image: redis:latest
    ports:
      - "6379:6379"